name: 🤖 Veritasium Trading Engine

on:
  schedule:
    # Ejecuta cada 10 minutos, 24/7
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode (live / dry-run)'
        required: false
        default: 'live'

concurrency:
  group: veritasium-trading
  cancel-in-progress: false   # Nunca cancelar una sesión activa

env:
  OPENFANG_VERSION: "0.5.10"
  RUST_LOG: "info"
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.10"

jobs:
  trade:
    name: 🧠 OpenFang · Multi-Agent Ecosystem
    runs-on: ubuntu-latest
    timeout-minutes: 9   # Evita overlap con el próximo cron

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout del repositorio
      # ──────────────────────────────────────────────────────────────
      - name: 📥 Checkout Ecosistema-Veritasium
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. Cache de herramientas para acelerar ejecuciones futuras
      # ──────────────────────────────────────────────────────────────
      - name: 💾 Cache OpenFang binary
        id: cache-openfang
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/openfang
          key: openfang-${{ env.OPENFANG_VERSION }}-linux-x86_64

      # ──────────────────────────────────────────────────────────────
      # 3. Instalar OpenFang (si no está en caché)
      # ──────────────────────────────────────────────────────────────
      - name: 🔧 Install OpenFang Runtime
        if: steps.cache-openfang.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.local/bin
          echo "⬇️  Descargando OpenFang v${OPENFANG_VERSION}..."
          curl -fsSL \
            "https://github.com/openfang-ai/openfang/releases/download/v${OPENFANG_VERSION}/openfang-linux-x86_64.tar.gz" \
            -o /tmp/openfang.tar.gz || {
              echo "⚠️  Release no disponible, compilando desde fuente..."
              sudo apt-get install -y --no-install-recommends \
                build-essential pkg-config libssl-dev
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              source "$HOME/.cargo/env"
              cargo install openfang --version "${OPENFANG_VERSION}" \
                --root ~/.local --locked 2>/dev/null || \
              cargo install openfang --root ~/.local --locked
              exit 0
            }
          tar -xzf /tmp/openfang.tar.gz -C /tmp
          mv /tmp/openfang ~/.local/bin/openfang
          chmod +x ~/.local/bin/openfang
          echo "✅ OpenFang instalado: $(~/.local/bin/openfang --version)"

      - name: 📌 Add OpenFang to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ──────────────────────────────────────────────────────────────
      # 4. Restaurar base de datos SQLite de sesiones anteriores
      # ──────────────────────────────────────────────────────────────
      - name: 🗄️  Restore trading state (SQLite)
        uses: actions/cache@v4
        with:
          path: |
            .veritasium/state.db
            .veritasium/logs/
          key: veritasium-state-${{ github.run_id }}
          restore-keys: |
            veritasium-state-

      - name: 📁 Ensure state directory exists
        run: mkdir -p .veritasium/logs

      # ──────────────────────────────────────────────────────────────
      # 5. Configurar Python para el Motor Fractal y Scripts
      # ──────────────────────────────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install polars numpy scipy requests \
                      solana solders base58 \
                      anchorpy          # Para interacción con programas Anchor (Zeta Markets)

      # ──────────────────────────────────────────────────────────────
      # 6. Validar secrets antes de operar
      # ──────────────────────────────────────────────────────────────
      - name: 🔐 Validate required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.GROQ_API_KEY }}" ]        && echo "❌ GROQ_API_KEY not set"        && MISSING=1
          [ -z "${{ secrets.SOLANA_PRIVATE_KEY }}" ]  && echo "❌ SOLANA_PRIVATE_KEY not set"  && MISSING=1
          [ -z "${{ secrets.SOLANA_RPC_URL }}" ]      && echo "❌ SOLANA_RPC_URL not set"       && MISSING=1
          [ -z "${{ secrets.PROFIT_WALLET }}" ]       && echo "❌ PROFIT_WALLET not set"       && MISSING=1
          [ -z "${{ secrets.RISK_HUNTER_WALLET }}" ]  && echo "❌ RISK_HUNTER_WALLET not set"  && MISSING=1
          [ $MISSING -eq 1 ] && echo "Configura los secrets en Settings → Secrets and variables → Actions" && exit 1
          echo "✅ Secrets obligatorios configurados."
          # Secrets opcionales (feedback loops Bot2↔Bot1)
          [ -z "${{ secrets.MAIN_WALLET }}" ]           && echo "⚠️  MAIN_WALLET no set (feedback Bot2→Bot1 desactivado)"
          [ -z "${{ secrets.MULTIPLICADOR_WALLET }}" ]  && echo "⚠️  MULTIPLICADOR_WALLET no set (inyección post-ZERO_CLAW parcial)"

      # ──────────────────────────────────────────────────────────────
      # 7. FASE 0: Cazador analiza criticalidad PRIMERO
      #    Su señal determina si Bot 2 puede operar este ciclo
      # ──────────────────────────────────────────────────────────────
      - name: 🦅 FASE 0 — Cazador: análisis fractal (jerarquía de señales)
        if: github.event_name == 'workflow_dispatch' || (github.run_number % 6 == 0)
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          SOLANA_PRIVATE_KEY:    ${{ secrets.SOLANA_PRIVATE_KEY }}
          SOLANA_RPC_URL:        ${{ secrets.SOLANA_RPC_URL }}
          PROFIT_WALLET:         ${{ secrets.PROFIT_WALLET }}
          RISK_HUNTER_WALLET:    ${{ secrets.RISK_HUNTER_WALLET }}
          MAIN_WALLET:           ${{ secrets.MAIN_WALLET }}
          MULTIPLICADOR_WALLET:  ${{ secrets.MULTIPLICADOR_WALLET }}
          BOT_MODE:              ${{ github.event.inputs.mode || 'live' }}
        run: |
          echo "🦅 Ejecutando Cazador (análisis fractal + gestión opciones)..."
          openfang run --hand hands/cazador --config config.toml \
                       --state .veritasium/state.db --headless --mode "$BOT_MODE"

      # ──────────────────────────────────────────────────────────────
      # 8. BOT 1: Recolector — siempre activo, cada 10 minutos
      # ──────────────────────────────────────────────────────────────
      - name: 🤖 BOT 1 — Recolector: mean reversion Z-Score
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          SOLANA_PRIVATE_KEY:    ${{ secrets.SOLANA_PRIVATE_KEY }}
          SOLANA_RPC_URL:        ${{ secrets.SOLANA_RPC_URL }}
          PROFIT_WALLET:         ${{ secrets.PROFIT_WALLET }}
          RISK_HUNTER_WALLET:    ${{ secrets.RISK_HUNTER_WALLET }}
          MAIN_WALLET:           ${{ secrets.MAIN_WALLET }}
          BOT_MODE:              ${{ github.event.inputs.mode || 'live' }}
        run: |
          echo "🤖 Ejecutando Recolector (mean reversion cada 10min)..."
          openfang run --hand hands/recolector --config config.toml \
                       --state .veritasium/state.db --headless --mode "$BOT_MODE"

      # ──────────────────────────────────────────────────────────────
      # 9. BOT 2: Multiplicador — cada hora (solo si Cazador no bloqueó)
      # ──────────────────────────────────────────────────────────────
      - name: 📈 BOT 2 — Multiplicador: trend following + pyramiding
        if: github.event_name == 'workflow_dispatch' || (github.run_number % 6 == 0)
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          SOLANA_PRIVATE_KEY:    ${{ secrets.SOLANA_PRIVATE_KEY }}
          SOLANA_RPC_URL:        ${{ secrets.SOLANA_RPC_URL }}
          PROFIT_WALLET:         ${{ secrets.PROFIT_WALLET }}
          RISK_HUNTER_WALLET:    ${{ secrets.RISK_HUNTER_WALLET }}
          MAIN_WALLET:           ${{ secrets.MAIN_WALLET }}
          MULTIPLICADOR_WALLET:  ${{ secrets.MULTIPLICADOR_WALLET }}
          BOT_MODE:              ${{ github.event.inputs.mode || 'live' }}
        run: |
          echo "📈 Ejecutando Multiplicador (trend following + pyramiding)..."
          echo "   (El Bot lee la señal del Cazador en DB antes de operar)"
          openfang run --hand hands/multiplicador --config config.toml \
                       --state .veritasium/state.db --headless --mode "$BOT_MODE"

      # ──────────────────────────────────────────────────────────────
      # 10. Sweeper de capital: distribuye excedentes entre bots
      # ──────────────────────────────────────────────────────────────
      - name: 🧹 Sweeper de capital (loops Bot1→Bot3 y Bot2→Bot1)
        if: always()
        env:
          SOLANA_PRIVATE_KEY:    ${{ secrets.SOLANA_PRIVATE_KEY }}
          SOLANA_RPC_URL:        ${{ secrets.SOLANA_RPC_URL }}
          RISK_HUNTER_WALLET:    ${{ secrets.RISK_HUNTER_WALLET }}
          PROFIT_WALLET:         ${{ secrets.PROFIT_WALLET }}
          MAIN_WALLET:           ${{ secrets.MAIN_WALLET }}
          BOT_MODE:              ${{ github.event.inputs.mode || 'live' }}
        run: |
          echo "🧹 Ejecutando Wallet Sweeper v2.0..."
          python scripts/wallet_sweeper.py

      # ──────────────────────────────────────────────────────────────
      # 11. Subir logs
      # ──────────────────────────────────────────────────────────────
      - name: 📊 Upload trading logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: .veritasium/logs/
          retention-days: 7

      # ──────────────────────────────────────────────────────────────
      # 12. Notificación de error (opcional — requiere WEBHOOK_URL)
      # ──────────────────────────────────────────────────────────────
      - name: 🚨 Notify on failure
        if: failure() && secrets.WEBHOOK_URL != ''
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ Veritasium falló en run #${{ github.run_number }}. Revisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
