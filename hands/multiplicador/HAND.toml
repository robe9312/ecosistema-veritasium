# ============================================================
#  HAND.toml — Manifiesto del Bot 2: Multiplicador
#  Ecosistema-Veritasium · Log-Normal Hand
# ============================================================

[hand]
name        = "Multiplicador"
version     = "1.0.0"
description = "Bot de Trend Following SOL/USDC usando leyes log-normales y compounding."
author      = "Ecosistema-Veritasium"

# Archivos
prompt_file = "prompt.txt"
skill_file  = "SKILL.md"

[schedule]
# Cada hora
cron        = "0 * * * *"
timezone    = "UTC"
timeout_sec = 600

[provider]
name        = "groq"
model       = "llama-3.3-70b-versatile"
temperature = 0.3 # Mayor temperatura para capturar sutilezas de tendencia

[blockchain]
network     = "mainnet-beta"

[blockchain.tokens]
sol_mint    = "So11111111111111111111111111111111111111112"
usdc_mint   = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

[risk]
max_trade_sol        = 0.25     # Mayor exposición que el Recolector
max_position_sol     = 1.0
daily_loss_limit_sol = 0.1
trailing_stop_pct    = 3.5      # Importante para trend following

[strategy]
name             = "log_normal_trend"
lookback_hours   = 24           # Análisis de tendencia diaria
hurst_threshold  = 0.55         # Entrar solo si hay persistencia

[state]
backend      = "sqlite"
db_path      = ".veritasium/state.db"

[execution]
mode         = "${BOT_MODE}"
confirm_txn  = false
