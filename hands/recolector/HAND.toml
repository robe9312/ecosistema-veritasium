# ============================================================
#  HAND.toml — Manifiesto del Bot 1: Recolector
#  Ecosistema-Veritasium · OpenFang Runtime
# ============================================================

[hand]
name        = "Recolector"
version     = "1.0.0"
description = "Bot de Mean Reversion SOL/USDC sobre Solana Mainnet usando Z-Score estadístico."
author      = "Ecosistema-Veritasium"

# Archivos principales del hand
prompt_file = "prompt.txt"
skill_file  = "SKILL.md"

# ──────────────────────────────────────────────────────────────
# SCHEDULE
# ──────────────────────────────────────────────────────────────
[schedule]
# Cada 10 minutos (coordinado con el cron del workflow)
cron        = "*/10 * * * *"
timezone    = "UTC"
timeout_sec = 480   # Máximo 8 minutos de ejecución por ciclo

# ──────────────────────────────────────────────────────────────
# PROVEEDOR DE IA
# ──────────────────────────────────────────────────────────────
[provider]
name        = "groq"
model       = "llama-3.3-70b-versatile"
temperature = 0.1          # Bajo para respuestas deterministas y analíticas
max_tokens  = 4096
top_p       = 0.9

# Endpoint oficial de Groq (sin costo en capa gratuita)
base_url    = "https://api.groq.com/openai/v1"

# Política de reintentos ante errores de API
[provider.retry]
max_attempts = 3
backoff_ms   = 2000
jitter       = true

# ──────────────────────────────────────────────────────────────
# BLOCKCHAIN: SOLANA MAINNET
# ──────────────────────────────────────────────────────────────
[blockchain]
network     = "mainnet-beta"
# RPC_URL se inyecta desde el secret SOLANA_RPC_URL

# Tokens involucrados
[blockchain.tokens]
sol_mint    = "So11111111111111111111111111111111111111112"
usdc_mint   = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

# Agregador de liquidez
[blockchain.dex]
aggregator  = "jupiter"
api_url     = "https://quote-api.jup.ag/v6"
slippage_bps = 50   # 0.5% de slippage máximo

# ──────────────────────────────────────────────────────────────
# GESTIÓN DE RIESGO (CRÍTICO)
# ──────────────────────────────────────────────────────────────
[risk]
# Tamaño máximo de cada operación individual
max_trade_sol        = 0.1      # ≈ $15–20 USD según precio actual

# Capital máximo en riesgo simultáneo
max_position_sol     = 0.25     # Nunca tener más de 0.25 SOL en posiciones abiertas

# Límites de pérdida diarios
daily_loss_limit_sol = 0.05     # Detiene el bot si pierde > 0.05 SOL en el día
max_drawdown_pct     = 15.0     # Stop total si equity cae > 15% del balance inicial

# Stop-Loss y Take-Profit dinámicos (en σ)
stop_loss_sigma      = 3.5      # Cierra posición si Z-Score cae a -3.5σ
take_profit_sigma    = 2.0      # Cierra posición al volver a 0 + 0.5σ adicional

# Enfriamiento tras stop-loss
cooldown_after_stop_min = 30

# ──────────────────────────────────────────────────────────────
# PARÁMETROS ESTADÍSTICOS (Mean Reversion)
# ──────────────────────────────────────────────────────────────
[strategy]
name             = "mean_reversion_zscore"
lookback_minutes = 100          # Ventana de cálculo MA y StdDev
buy_threshold    = -2.0         # Comprar cuando Z-Score < -2σ
sell_threshold   =  2.0         # Vender cuando Z-Score > +2σ
min_volume_sol   = 1000.0       # Volumen mínimo para considerar la señal válida

# ──────────────────────────────────────────────────────────────
# DISTRIBUCIÓN DE GANANCIAS
# ──────────────────────────────────────────────────────────────
[profit_distribution]
# 20% de cada ganancia se transfiere automáticamente al Bot 3
bot3_share_pct    = 20.0
# Dirección de la billetera del Bot 3 (se inyecta desde secret PROFIT_WALLET)
# bot3_wallet     = "${PROFIT_WALLET}"
min_profit_to_transfer_sol = 0.001   # Solo transferir si la ganancia supera este umbral

# ──────────────────────────────────────────────────────────────
# PERSISTENCIA Y LOGGING
# ──────────────────────────────────────────────────────────────
[state]
backend      = "sqlite"
db_path      = ".veritasium/state.db"
log_trades   = true
log_level    = "info"           # debug | info | warn | error

# ──────────────────────────────────────────────────────────────
# MODO DE OPERACIÓN
# ──────────────────────────────────────────────────────────────
[execution]
# "live" = opera con dinero real | "dry-run" = simula sin transacciones
mode         = "${BOT_MODE}"    # Inyectado desde la variable de entorno del workflow
confirm_txn  = false            # Sin confirmación manual (headless)
max_retries  = 3                # Reintentos por transacción fallida
