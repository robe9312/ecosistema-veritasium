# ============================================================
#  config.toml — Configuración Global de OpenFang
#  Ecosistema-Veritasium
# ============================================================

[openfang]
version     = "0.5.10"
project     = "Ecosistema-Veritasium"
description = "Sistema de trading algorítmico autónomo sobre Solana Mainnet"

# ──────────────────────────────────────────────────────────────
# PROVEEDOR DE IA POR DEFECTO
# ──────────────────────────────────────────────────────────────
[ai]
default_provider = "groq"

[ai.providers.groq]
type        = "openai_compatible"
base_url    = "https://api.groq.com/openai/v1"
# La API key se inyecta desde la variable de entorno GROQ_API_KEY
api_key_env = "GROQ_API_KEY"
default_model     = "llama-3.3-70b-versatile"
fallback_model    = "llama-3.1-8b-instant"   # Modelo de respaldo si hay rate limit
max_rpm           = 30        # Requests por minuto (capa gratuita de Groq)
max_tokens_per_min = 6000     # Límite de tokens por minuto (capa gratuita)

# Configuración del cliente HTTP
[ai.providers.groq.http]
timeout_sec   = 60
connect_timeout_sec = 10
max_retries   = 3
retry_backoff_ms    = 2000

# ──────────────────────────────────────────────────────────────
# PERSISTENCIA: SQLite
# ──────────────────────────────────────────────────────────────
[storage]
backend = "sqlite"
path    = ".veritasium/state.db"

# Esquema de tablas a crear automáticamente al iniciar
[storage.schema]
auto_migrate = true

[[storage.schema.tables]]
name   = "trades"
sql    = """
  CREATE TABLE IF NOT EXISTS trades (
    id                    INTEGER PRIMARY KEY AUTOINCREMENT,
    timestamp             TEXT    NOT NULL DEFAULT (datetime('now')),
    hand_id               TEXT    NOT NULL,   -- recolector | multiplicador | cazador
    action                TEXT    NOT NULL,   -- BUY | SELL | STOP_LOSS | HOLD
    entry_price           REAL,
    exit_price            REAL,
    trade_size_sol        REAL,
    profit_sol            REAL    DEFAULT 0,
    z_score               REAL,
    sma                   REAL,
    std_dev               REAL,
    hurst                 REAL,
    kurtosis              REAL,
    sentiment             TEXT,
    sentiment_score       INTEGER,
    confidence_score      REAL,
    txn_signature         TEXT,
    profit_transfer_sol   REAL    DEFAULT 0,
    profit_transfer_txn   TEXT,
    profit_transfer_dst   TEXT,               -- RISK_HUNTER | PROFIT_WALLET
    cycle_notes           TEXT,
    mode                  TEXT    DEFAULT 'live'  -- live | dry-run
  );
"""

[[storage.schema.tables]]
name   = "performance_metrics"
sql    = """
  CREATE TABLE IF NOT EXISTS performance_metrics (
    date               TEXT    PRIMARY KEY,
    total_trades       INTEGER DEFAULT 0,
    winning_trades     INTEGER DEFAULT 0,
    losing_trades      INTEGER DEFAULT 0,
    win_rate           REAL    DEFAULT 0,
    total_profit_sol   REAL    DEFAULT 0,
    max_drawdown_sol   REAL    DEFAULT 0,
    sharpe_approx      REAL    DEFAULT 0,
    total_fees_sol     REAL    DEFAULT 0
  );
"""

[[storage.schema.tables]]
name   = "pending_transfers"
sql    = """
  CREATE TABLE IF NOT EXISTS pending_transfers (
    id                 INTEGER PRIMARY KEY AUTOINCREMENT,
    timestamp          TEXT    NOT NULL DEFAULT (datetime('now')),
    amount_sol         REAL    NOT NULL,
    accumulated_sol    REAL    NOT NULL,
    status             TEXT    DEFAULT 'pending'  -- pending | sent
  );
"""

[[storage.schema.tables]]
name   = "open_positions"
sql    = """
  CREATE TABLE IF NOT EXISTS open_positions (
    id                 INTEGER PRIMARY KEY AUTOINCREMENT,
    opened_at          TEXT    NOT NULL DEFAULT (datetime('now')),
    direction          TEXT    NOT NULL,   -- long | short (actualmente solo long)
    entry_price        REAL    NOT NULL,
    trade_size_sol     REAL    NOT NULL,
    entry_txn          TEXT,
    z_score_at_entry   REAL,
    status             TEXT    DEFAULT 'open'  -- open | closed
  );
"""

# ──────────────────────────────────────────────────────────────
# LOGGING GLOBAL
# ──────────────────────────────────────────────────────────────
[logging]
level       = "info"       # debug | info | warn | error
output      = "both"       # stdout | file | both
log_dir     = ".veritasium/logs"
rotation    = "daily"
max_files   = 7            # Mantener 7 días de logs
format      = "json"       # json | text

# ──────────────────────────────────────────────────────────────
# NOTIFICACIONES (OPCIONAL)
# ──────────────────────────────────────────────────────────────
[notifications]
enabled               = false   # Activar si tienes WEBHOOK_URL configurado
webhook_env           = "WEBHOOK_URL"
notify_on_trade       = true
notify_on_stop_loss   = true
notify_on_daily_limit = true
notify_on_error       = true

# ──────────────────────────────────────────────────────────────
# MODO DE SEGURIDAD GLOBAL
# ──────────────────────────────────────────────────────────────
[safety]
# Si ocurren N errores consecutivos, detener el bot hasta revisión manual
max_consecutive_errors = 5
halt_on_rpc_failure    = true
halt_on_low_balance    = true
min_sol_reserve        = 0.02   # Mantener siempre este SOL para fees

# Ventana de tiempo para reset de contadores de error
error_window_min       = 60

# ──────────────────────────────────────────────────────────────
# MANOS REGISTRADAS
# ──────────────────────────────────────────────────────────────
[[hands]]
id      = "recolector"
path    = "hands/recolector"
enabled = true
description = "Bot 1 — Mean Reversion Z-Score (Normal Distribution)"

[[hands]]
id      = "multiplicador"
path    = "hands/multiplicador"
enabled = true
description = "Bot 2 — Trend Following (Log-Normal Distribution)"

[[hands]]
id      = "cazador"
path    = "hands/cazador"
enabled = true
description = "Bot 3 — Eventos Extremos (Ley de Potencia)"

# ──────────────────────────────────────────────────────────────
# FLUJOS DE CAPITAL — EL ECOSISTEMA COMPLETO
# ──────────────────────────────────────────────────────────────
# Este mapa documenta los flujos de capital entre los tres bots.
# Es la implementación técnica de la teoría de portafolios de
# tres distribuciones no correlacionadas (Normal + Log-Normal + Power Law).
#
#  Bot 1 (Recolector)  ──[20% profit]──►  Bot 3 (Cazador / RISK_HUNTER_WALLET)
#       ▲                                         │
#       │                               [ZERO_CLAW event: 25%]
#  [30% profit Bot2]                              │
#       │                                         ▼
#  Bot 2 (Multiplicador) ◄──────────────  Inyección masiva de capital
#       │
#       └──[40% profit]──► PROFIT_WALLET (acumulación real del usuario)
#
# ──────────────────────────────────────────────────────────────

[capital_flows]
description = "Mapa de distribución de capital entre agentes del ecosistema"

# Bot 1 → Bot 3: financiar el colchón del Cazador
[capital_flows.bot1_to_bot3]
trigger         = "trade_profit"
percentage      = 20.0
destination     = "RISK_HUNTER_WALLET"
condition       = "risk_hunter_balance < 0.5 SOL"
fallback        = "PROFIT_WALLET"     # Si el tanque está lleno, va al usuario

# Bot 2 → Bot 1: refuerzo del margen operativo
[capital_flows.bot2_to_bot1]
trigger         = "trade_profit"
percentage      = 30.0
destination     = "MAIN_WALLET"
condition       = "profit_neto > 0.05 SOL"
purpose         = "Aumentar volumen operativo del Recolector sin aumentar riesgo unitario"

# Bot 2 → Usuario: acumulación real
[capital_flows.bot2_to_user]
trigger         = "trade_profit"
percentage      = 40.0
destination     = "PROFIT_WALLET"

# Bot 3 → Ecosistema (evento ZERO_CLAW)
[capital_flows.bot3_zero_claw]
trigger         = "zero_claw_profit"
distribution    = { profit_wallet = 50.0, bot1_wallet = 25.0, bot2_wallet = 15.0, self_reserve = 10.0 }
condition       = "profit > 10x entrada"
purpose         = "Reescalar todo el ecosistema con las ganancias del evento extremo"

# ──────────────────────────────────────────────────────────────
# JERARQUÍA DE SEÑALES
# ──────────────────────────────────────────────────────────────
# Cuando múltiples bots quieren operar, esta jerarquía decide quién tiene prioridad.

[signal_hierarchy]
description = "Prioridad de señales entre agentes (mayor número = mayor prioridad)"
recolector   = 1   # Opera siempre excepto cuando Cazador está activo
multiplicador = 2  # Opera en tendencias, se detiene ante criticalidad del Cazador
cazador       = 3  # Prioridad máxima — cuando ZERO_CLAW activa, los demás se detienen

[signal_hierarchy.cazador_override]
trigger   = "ZERO_CLAW_ATTACK"
action    = "halt_multiplicador_new_positions"
action2   = "close_multiplicador_open_positions"
reason    = "Criticalidad del mercado: el Cazador necesita campo libre para el evento extremo"

# ──────────────────────────────────────────────────────────────
# SECRETS REQUERIDOS (referencia completa)
# ──────────────────────────────────────────────────────────────
# Configurar en: Settings → Secrets and variables → Actions
#
#  GROQ_API_KEY           — Clave de Groq (llama-3.3-70b)
#  SOLANA_PRIVATE_KEY     — Clave privada wallet principal (Bot 1)
#  SOLANA_RPC_URL         — Endpoint RPC Solana (Helius recomendado)
#  PROFIT_WALLET          — Dirección pública wallet acumulación usuario
#  RISK_HUNTER_WALLET     — Dirección pública colchón Bot 3 (wallet separada)
#  MAIN_WALLET            — Dirección pública Bot 1 (para recibir refuerzo de Bot 2)
#  MULTIPLICADOR_WALLET   — Dirección pública Bot 2 (para recibir inyección post-ZERO_CLAW)
#  WEBHOOK_URL            — (Opcional) Discord/Slack para alertas

[secrets]
required = ["GROQ_API_KEY", "SOLANA_PRIVATE_KEY", "SOLANA_RPC_URL",
            "PROFIT_WALLET", "RISK_HUNTER_WALLET"]
optional = ["MAIN_WALLET", "MULTIPLICADOR_WALLET", "WEBHOOK_URL"]
